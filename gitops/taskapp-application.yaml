apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PRHURMEEZE/capstone-phoenix.git
    targetRevision: HEAD
    path: manifests/taskapp
  destination:
    server: https://kubernetes.default.svc
    namespace: taskapp
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      name: taskapp-secret
      jsonPointers:
        - /data
        - /stringData
    - group: networking.k8s.io
      kind: Ingress
      jsonPointers:
        - /metadata/annotations
    - group: networking.k8s.io
      kind: NetworkPolicy
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
